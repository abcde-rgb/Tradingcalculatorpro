name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          PUBLIC_URL: /Tradingcalculatorpro
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL || secrets.REACT_APP_BACKEND_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GA4_MEASUREMENT_ID: ${{ vars.REACT_APP_GA4_MEASUREMENT_ID || secrets.REACT_APP_GA4_MEASUREMENT_ID }}
          REACT_APP_GTM_ID: ${{ vars.REACT_APP_GTM_ID || secrets.REACT_APP_GTM_ID }}
          REACT_APP_GSC_VERIFICATION: ${{ vars.REACT_APP_GSC_VERIFICATION || secrets.REACT_APP_GSC_VERIFICATION }}
          REACT_APP_BING_VERIFICATION: ${{ vars.REACT_APP_BING_VERIFICATION || secrets.REACT_APP_BING_VERIFICATION }}
        run: npm run build

      - name: Copy 404.html
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
