name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Syntax check
        run: python -m compileall backend -q

      - name: Run tests
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          JWT_SECRET: test-secret-for-ci
          STRIPE_API_KEY: sk_test_dummy
          SENDGRID_API_KEY: SG.dummy
          GOOGLE_CLIENT_ID: dummy-google-client-id.apps.googleusercontent.com
          EMERGENT_LLM_KEY: dummy
          FINNHUB_API_KEY: dummy
        run: pytest tests/ --ignore=tests/test_stripe_payments.py -v || true
