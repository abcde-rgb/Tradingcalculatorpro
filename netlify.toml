[build]
  base = "frontend"
  command = "npm run build"
  publish = "frontend/build"

[build.environment]
  CI = "false"
  DISABLE_ESLINT_PLUGIN = "true"
  NODE_OPTIONS = "--openssl-legacy-provider"
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
