services:
  - type: web
    name: tradingcalculatorpro-api
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DB_NAME
        value: trading_calculator_pro
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: alerts@tradingcalculator.pro
      - key: ENABLE_DEMO_USER
        value: "false"

  - type: web
    name: tradingcalculatorpro-web
    runtime: static
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PUBLIC_URL
        value: /
      - key: CI
        value: "false"
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: tradingcalculatorpro-api
          type: web
          property: host
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
      - key: REACT_APP_GA4_MEASUREMENT_ID
        sync: false
      - key: REACT_APP_GTM_ID
        sync: false
      - key: REACT_APP_ADSENSE_PUBLISHER_ID
        sync: false
      - key: REACT_APP_GSC_VERIFICATION
        sync: false
      - key: REACT_APP_BING_VERIFICATION
        sync: false
